name: stock-trader
description: Live stock-trader research tools (quotes, technical analysis, options, scans, news/sentiment, risk, Alpha Vantage) via the vulcan REST service — the same 18 tools OpenClaw uses
command: /Users/johnw/src/stock-trader/.venv/bin/python
args:
  - /Users/johnw/.config/stock-trader/mcp-client.py
env:
  STOCK_TRADER_BASE_URL: https://trader.vulcan.lan
  REQUESTS_CA_BUNDLE: /Users/johnw/.config/stock-trader/vulcan-root-ca.crt
scope: user
enabled: true
# Laptop-only: the command path (stock-trader .venv) and the CA bundle exist
# only on this machine, so restrict to the local personal Claude config. Do NOT
# broaden to the `claude` label — that fans out to vulcan/vps/andoria/git-ai
# where these paths don't exist. Add claude-positron / claude-git-ai-local here
# if you want it in those local profiles too.
only:
  - claude-personal
