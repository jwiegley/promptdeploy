name: drafts-hera
description: Drafts.app on hera (macOS) via SSH-stdio to drafts-mcp-server — host Claude Code (claude-vulcan, operator context, FULL toolset incl. drafts_run_action). Bypasses the SSE bridge; the autonomous OpenClaw/Hermes microVMs use the SSE bridge endpoint instead (full read/write draft surface since 2026-06-10, gated only against drafts_run_action).
command: ssh
args:
  - "-T"
  - "-i"
  - "/run/secrets/drafts/hera-ssh-private-key"
  - "-o"
  - "IdentitiesOnly=yes"
  - "-o"
  - "BatchMode=yes"
  - "-o"
  - "StrictHostKeyChecking=yes"
  - "-o"
  - "ConnectTimeout=10"
  - "-o"
  - "ServerAliveInterval=30"
  - "-o"
  - "ServerAliveCountMax=3"
  - "johnw@hera.lan"
  - "/etc/profiles/per-user/johnw/bin/drafts-mcp-server"
scope: user
enabled: true
# Host Claude Code on the vulcan HOST reaching Drafts.app on hera via SSH-stdio
# (the microVMs can't do this — they use the write-gated SSE bridge instead).
#
# Operator context, UNATTENDED: vulcan has no local YubiKey, so this path
# authenticates with the DEDICATED ed25519 key (the SAME forced-command key the
# drafts-mcp bridge service uses), decrypted by sops to
# /run/secrets/drafts/hera-ssh-private-key (owner johnw, mode 0400).
# `-i <key> -o IdentitiesOnly=yes` forces that key (NOT the agent / id_vulcan,
# which hera rejects). hera's authorized_keys forced-command pins the
# connection to drafts-mcp-server (full operator toolset — so the remote-command
# arg below is ignored). No touch, no forwarded agent required.
#
# Requires BOTH: drafts-mcp-server at /etc/profiles/per-user/johnw/bin/ on hera
# (darwin switch — done 2026-06-09), AND the sops secret
# drafts/hera-ssh-private-key present on vulcan (nixos switch — Phase 2). Until
# the nixos switch the -i key file is absent and this entry will fail to launch;
# redeploy this file only after that switch.
only:
  - claude-vulcan
