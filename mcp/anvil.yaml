name: anvil
description: >-
  Cross-platform Anvil MCP surface: 12 interactive Emacs tools, 42 NeLisp
  standalone tools, or 88 unified tools from a dedicated Emacs daemon.
command: anvil-mcp
args:
  - "--server-id=anvil"
scope: user
enabled: true
only:
  - claude-personal
  - claude-positron
  - codex-local
  - codex-hera
  - droid
  - opencode-hera
  - codex-clio
  - opencode-clio
  - claude-vulcan
  - opencode-vulcan
  - claude-vps
  - claude-andoria
  - codex-andoria
# Nix supplies the PATH-stable launcher on every selected host. Its local
# boolean chooses NeLisp or dedicated Emacs on Linux, and interactive or
# dedicated Emacs on Darwin; promptdeploy does not encode either choice.
#
# The Andoria targets write the shared NFS-hosted agent configuration once.
# At runtime the launcher derives the actual short hostname, so andoria-08,
# andoria-t2, delphi-3bd4, and gpu-server use distinct host-local sockets.
#
# Dedicated mode mirrors all 76 typed tools into this primary registration,
# yielding 88 unique tools. Interactive mode keeps the split anvil-tools
# registration, while NeLisp intentionally exposes its 42-tool standalone
# surface only through this server ID.
