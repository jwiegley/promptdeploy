name: anvil
description: >-
  Cross-platform Anvil MCP surface: 13 interactive Emacs tools, 42 NeLisp
  standalone tools, or 89 unified tools from a dedicated Emacs daemon.
command: anvil-mcp
args:
  - "--server-id=anvil"
claude:
  timeout: 210000
codex:
  startup_timeout_sec: 180
  tool_timeout_sec: 210
opencode:
  timeout: 210000
scope: user
enabled: true
only:
  - claude-personal
  - claude-positron
  - codex-local
  - codex-hera
  - droid
  - opencode-hera
  - codex-clio
  - opencode-clio
  - claude-vulcan
  - opencode-vulcan
  - claude-vps
  - claude-andoria
  - codex-andoria
# Nix supplies the PATH-stable launcher on every selected host. Its local
# boolean chooses NeLisp or dedicated Emacs on Linux, and interactive or
# dedicated Emacs on Darwin; promptdeploy does not encode either choice.
#
# The Andoria targets write the shared NFS-hosted agent configuration once.
# At runtime the launcher derives the actual short hostname, so andoria-08,
# andoria-t2, delphi-3bd4, and gpu-server use distinct host-local sockets.
#
# Dedicated mode mirrors all typed tools into this one primary registration.
# The legacy anvil-tools sibling remains only as a disabled removal tombstone;
# clients must launch this server alone.
