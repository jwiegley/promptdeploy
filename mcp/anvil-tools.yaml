name: anvil-tools
description: >-
  Retired split Anvil registration. This disabled tombstone removes stale
  client entries while the unified anvil registration remains active.
command: anvil-mcp
args:
  - "--server-id=emacs-eval"
scope: user
enabled: false
only:
  - claude-personal
  - claude-positron
  - codex-local
  - codex-hera
  - droid
  - opencode-hera
  - codex-clio
  - opencode-clio
  - claude-vulcan
  - opencode-vulcan
  - claude-vps
  - claude-andoria
  - codex-andoria
  - opencode-andoria-08
  - claude-andoria-t2
  - opencode-andoria-t2
  - claude-delphi-3bd4
  - opencode-delphi-3bd4
  - claude-gpu-server
  - opencode-gpu-server
# Keep this source item until every managed client manifest has migrated.
# Semantic named-entry drift checks also remove the registration again if an
# external writer restores it after migration.
