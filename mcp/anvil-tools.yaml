name: anvil-tools
description: >-
  Direct typed Anvil registry for Emacs-backed macOS hosts: 65 tools in the
  interactive configuration and 76 tools in the dedicated configuration.
command: anvil-mcp
args:
  - "--server-id=emacs-eval"
scope: user
enabled: true
only:
  - hera
  - clio
# Host-group scoping is intentional: host-less targets belong to whichever
# machine runs promptdeploy. The hera/clio groups include those targets only
# when the current host is Darwin, while still reaching explicit remote Mac
# targets from another machine. This prevents an Emacs-only registration from
# colliding with the shared Linux configurations.
#
# The historical server ID remains "emacs-eval". Dedicated mode also mirrors
# these tools into the primary anvil registration.
