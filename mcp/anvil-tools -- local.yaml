name: anvil-tools
description: Typed anvil.el tool surface — 43 schema-checked tools for files (incl. token-efficient file-batch), org-mode structure editing and agenda, git queries, JSON/state, workers, and telemetry
command: /Users/johnw/.emacs.d/anvil-mcp.sh
args:
  - "--socket=/tmp/johnw-emacs/server"
  - "--server-id=emacs-eval"
scope: user
enabled: true
# Same bridge as the `anvil` server, different anvil.el server-id: the anvil
# modules register their typed tools under the (historical) server-id
# "emacs-eval", while the eval suite registers under "anvil". A server-id
# mismatch is NOT an error — anvil silently serves an empty tools table — so
# keep this arg exactly in sync with `anvil-server--tools' registrations.
#
# Requires the same running GUI Emacs daemon as the anvil server; see the
# comments in "anvil -- local.yaml" for the wrapper/socket details, and the
# `anvil` skill for tool-selection guidance.
