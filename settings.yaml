base:
  env:
    ANTHROPIC_DEFAULT_HAIKU_MODEL: claude-sonnet-4-6
    CLAUDE_AUTOCOMPACT_PCT_OVERRIDE: '80'
    CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY: '1'
    CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: '1'
    CLAUDE_CODE_MAX_OUTPUT_TOKENS: '64000'
    CLAUDE_CODE_NO_FLICKER: '1'
    CLAUDE_CODE_SUBAGENT_MODEL: opus
    DISABLE_AUTOUPDATER: '1'
    ENABLE_LSP_TOOL: '1'
    ENABLE_TOOL_SEARCH: '1'
    FORCE_AUTOUPDATE_PLUGINS: '1'
    MCP_TIMEOUT: '1800000'
    MCP_TOOL_TIMEOUT: '1800000'
  statusLine:
    type: command
    command: bash /Users/johnw/.config/claude/personal/statusline-command.sh
  sandbox:
    enabled: false
    autoAllowBashIfSandboxed: true
    filesystem:
      allowWrite:
        - /private/tmp
        - /var/folders
      allowRead:
        - /private/tmp
        - /var/folders
        - /Users/johnw/Products
    excludedCommands:
      - gh
  effortLevel: max
  showThinkingSummaries: true
  skipDangerousModePermissionPrompt: true
  verbose: true
  preferredNotifChannel: iterm2_with_bell
  remoteControlAtStartup: true
  agentPushNotifEnabled: true
  model: claude-opus-4-8
  theme: dark
overrides:
  claude-positron:
    preferredNotifChannel:
    statusLine:
      command: bash /Users/johnw/.config/claude/positron/statusline-command.sh
  claude-andoria:
    preferredNotifChannel:
    statusLine:
      command: bash /home/jwiegley/.claude/statusline-command.sh
  claude-git-ai-local:
    preferredNotifChannel:
    statusLine:
      command: bash /Users/johnw/.config/claude/git-ai/statusline-command.sh
  claude-git-ai-remote:
    preferredNotifChannel:
    statusLine:
      command: bash /home/ubuntu/.claude/statusline-command.sh
  claude-vulcan:
    preferredNotifChannel:
    statusLine:
      command: bash /home/johnw/.claude/statusline-command.sh
  claude-vps:
    preferredNotifChannel:
    statusLine:
      command: bash /home/johnw/.claude/statusline-command.sh
