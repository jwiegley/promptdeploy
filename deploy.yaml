source_root: .

hosts: [hera, clio, vulcan, vps, andoria-08]

targets:
  claude-personal:
    type: claude
    path: ~/.config/claude/personal
    labels: [claude, personal, local]

  claude-positron:
    type: claude
    path: ~/.config/claude/positron
    labels: [claude, positron, local]

  claude-git-ai-local:
    type: claude
    path: ~/.config/claude/git-ai
    labels: [claude, personal, local]

  codex-local:
    type: codex
    path: "~"
    labels: [codex, personal, local]

  claude-git-ai-remote:
    type: claude
    path: ~/.claude
    host: git-ai
    labels: [claude, git-ai, remote]

  droid:
    type: droid
    path: ~/.factory
    labels: [personal, local]

  codex-hera:
    type: codex
    path: "~"
    host: hera
    labels: [codex, personal, remote]

  opencode-vulcan:
    type: opencode
    path: ~/.config/opencode
    host: vulcan
    labels: [personal, remote]

  opencode-hera:
    type: opencode
    path: ~/.config/opencode
    host: hera
    labels: [personal, remote]

  opencode-clio:
    type: opencode
    path: ~/.config/opencode
    host: clio
    labels: [personal, remote]

  codex-clio:
    type: codex
    path: "~"
    host: clio
    labels: [codex, personal, remote]

  claude-vulcan:
    type: claude
    path: ~/.claude
    host: vulcan
    labels: [claude, personal, remote]

  claude-vps:
    type: claude
    path: ~/.claude
    host: vps
    labels: [claude, personal, remote]

  claude-andoria:
    type: claude
    path: ~/.claude
    host: andoria-08
    labels: [claude, positron, remote]

  codex-andoria:
    type: codex
    path: "~"
    host: andoria-08
    labels: [codex, personal, positron, remote]

  gptel-emacs:
    type: gptel
    path: ~/.emacs.d/prompts
    labels: [personal, gptel, local]
