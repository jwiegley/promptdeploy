source_root: .

hosts: [hera, clio]

targets:
  claude-personal:
    type: claude
    path: ~/.config/claude/personal
    labels: [claude, personal, local]

  claude-positron:
    type: claude
    path: ~/.config/claude/positron
    labels: [claude, positron, local]

  claude-git-ai-local:
    type: claude
    path: ~/.config/claude/git-ai
    labels: [claude, personal, local]

  claude-git-ai-remote:
    type: claude
    path: ~/.claude
    host: git-ai
    labels: [claude, git-ai, remote]

  droid:
    type: droid
    path: ~/.factory
    labels: [personal, local]

  opencode:
    type: opencode
    path: ~/.config/opencode
    labels: [personal, local]

  opencode-vulcan:
    type: opencode
    path: ~/.config/opencode
    host: vulcan
    labels: [personal, remote]

  claude-vulcan:
    type: claude
    path: ~/.claude
    host: vulcan
    labels: [claude, personal, remote]

  claude-vps:
    type: claude
    path: ~/.claude
    host: vps
    labels: [claude, personal, remote]

  claude-andoria:
    type: claude
    path: ~/.claude
    host: andoria-08
    labels: [claude, positron, remote]
