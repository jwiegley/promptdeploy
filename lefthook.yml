pre-commit:
  parallel: true
  commands:
    ruff-format:
      glob: "*.py"
      run: ruff format --check {staged_files}
    ruff-lint:
      glob: "*.py"
      run: ruff check {staged_files}
    mypy:
      glob: "*.py"
      run: PYTHONPATH=src mypy src/ tests/
    nix-check:
      glob: "*.{py,nix,toml,yaml}"
      run: nix flake check --no-warn-dirty 2>&1
    pytest:
      glob: "*.{py,yaml,toml}"
      run: PYTHONPATH=src python -m pytest tests/ -x -q --cov --cov-report=term-missing
