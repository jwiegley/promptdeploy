pre-commit:
  parallel: true
  commands:
    ruff-format:
      glob: "*.py"
      run: ruff format --check {staged_files}
    ruff-lint:
      glob: "*.py"
      run: ruff check {staged_files}
    mypy:
      glob: "*.py"
      run: uv run --extra dev mypy src/ tests/
    nix-check:
      glob: "*.{py,nix,toml,yaml}"
      run: nix flake check --no-warn-dirty 2>&1
    pytest:
      glob: "*.{py,yaml,toml}"
      run: PYTHONPATH=src python -m pytest tests/ -x -q --cov --cov-report=term-missing
    agnix:
      glob: "*.{md,yaml,yml,json,toml}"
      # agnix is not in nixpkgs (it comes from a personal overlay), so skip
      # gracefully rather than hard-failing pre-commit on a fresh clone.
      run: command -v agnix >/dev/null 2>&1 || { echo "agnix not installed; skipping"; exit 0; }; agnix .
