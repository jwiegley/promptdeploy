name: mem0
description: Mem0 persistent memory session hooks
only:
  - claude-personal
hooks:
  SessionStart:
    - matcher: "startup|compact"
      hooks:
        - command: "/Users/johnw/.config/claude/mem0-env.sh mem0-hook-context"
          timeout: 30000
          type: command
  Stop:
    - hooks:
        - command: "/Users/johnw/.config/claude/mem0-env.sh mem0-hook-stop"
          timeout: 30000
          type: command
