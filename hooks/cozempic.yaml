name: cozempic
description: Cozempic context weight management hooks
only:
  - claude
hooks:
  PostToolUse:
    - matcher: "Task"
      hooks:
        - command: "cozempic checkpoint 2>/dev/null || true"
          type: command
    - matcher: "TaskCreate|TaskUpdate"
      hooks:
        - command: "cozempic checkpoint 2>/dev/null || true"
          type: command
  PreCompact:
    - matcher: ""
      hooks:
        - command: "cozempic checkpoint 2>/dev/null || true"
          type: command
  SessionStart:
    - matcher: ""
      hooks:
        - command: "cozempic guard --daemon 2>/dev/null || true"
          type: command
  Stop:
    - matcher: ""
      hooks:
        - command: "cozempic checkpoint 2>/dev/null || true"
          type: command
