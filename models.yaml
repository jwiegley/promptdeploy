    display_name: "LiteLLM"
    base_url: "https://litellm.vulcan.lan/v1/"
    api_key: "${LITELLM_API_KEY}"
    droid:
      provider_type: generic-chat-completion-api
      no_image_support: true
      extra_args:
        min_p: 0
        temperature: 1
        top_p: 1
      extra_headers:
        x-litellm-tags: droid
